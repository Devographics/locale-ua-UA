  # thanks
  - key: general.back
    t: Повернутися на попередню сторінку
  - key: general.back_to_survey
    t: Повернутися до опитування
  - key: general.thanks
    t: >
      Дякуємо за проходження опитування! Ваші відповіді збережені.


      Крім того, ви допоможете нам, якщо поділитеся цим з іншими. 
      Чим більша залученість, тим точніша репрезентативність даних:

  - key: general.thanks1
    t: >
      Дякуємо за проходження опитування! Ваші відповіді збережені.
  - key: general.thanks2
    t: >
      Допоможіть нам, поділившись цим опитуванням з іншими. 
      Чим більша залученість, тим точніша репрезентативність даних:
  - key: thanks.learn_more_about
    t: "Функції, про які хотіли б дізнатись більше:"
  - key: thanks.knowledge_score
    t: Рівень ваших знань
  - key: thanks.features_score
    t: Кількість функцій
  - key: thanks.quiz_score
    t: Підсумок вікторини
  - key: thanks.score_statistics
    t: >
      Ви використовували {usage_count} та знаєте ще {awareness_count} 
      із {total} функцій, згаданих в опитуванні. 
      Ви — серед {knowledgeRankingFromTop} найуспішніших респондентів. 
      Молодець!
  - key: thanks.score_statistics_noranking
    t: >
      Ви використовували {usage_count} та знаєте ще {awareness_count} 
      із {total} функцій, згаданих в опитуванні. 
      Молодець!
  - key: thanks.points
    t: >
      бали
  - key: thanks.score_awareness_explanation
    t: >
      Щоб бути справедливим, цей відсоток обчислюється лише для {awareness_total} функцій, які ви хоча б знаєте
  - key: thanks.share_on_twitter
    t: Поділитися результатом у Twitter
  - key: thanks.share_score_message
    t: >
      Мій рівень знань у цьогорічному опитуванні #{hashtag} — {score} балів! 
      Я використовував(-ла) {usage_count} і знаю ще {awareness_count} функцій, 
      і опинився(-лась) серед {rank}% найуспішніших респондентів. 
      Зможеш краще? {shareUrl}
