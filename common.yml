  # homepage
  - key: general.why_create_account
    t: Навіщо потрібно створювати акаунт?
  - key: general.create_account_reasons
    t: >
      Ми просимо вас зареєструватися, щоб:

      - Уникнути дублювання відповідей

      - Дати доступ до ваших відповідей

      - Зберегти поточний прогрес проходження опитування

      - Сповістити вас, коли будуть опубліковані результати
  - key: general.survey_closed_detailed
    t: >
      Вибачте, але опитування завершено! Ви можете переглянути свої відповіді, але не змінити.
  - key: general.survey_read_only
    t: >
      Зараз ви переглядаєте опитування в режимі читання.
  - key: general.survey_preview
    t: >
      Опитування у **режимі попереднього перегляду**. Його запитання можуть змінюватися, і будь-які дані, які ви зараз введете, **будуть видалені**, коли опитування фактично розпочнеться.
  - key: general.survey_feedback
    t: Залишити відгук

  - key: general.survey_read_only_back
    t: >
      <a href="{link}">Поверніться</a> на головну сторінку опитування, щоб почати або відновити сесію.
  - key: general.take_survey
    t: Візьміть участь в опитуванні "{name}"

  - key: options.na
    t: 🚫 Нічого

